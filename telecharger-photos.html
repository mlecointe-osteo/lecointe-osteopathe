<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Récupération des photos – lecointe-osteopathe.fr</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { color: #5a5249; }
    .info { background: #f0fafa; border-left: 4px solid #2bbfbf; padding: 14px 18px; border-radius: 6px; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 24px; }
    .card { border: 1px solid #ddd; border-radius: 10px; overflow: hidden; background: #fafafa; }
    .card img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .card-body { padding: 10px; }
    .card-body p { font-size: .82rem; color: #555; margin-bottom: 8px; word-break: break-all; }
    .btn {
      display: inline-block; width: 100%;
      background: #2bbfbf; color: #fff; text-align: center;
      padding: 8px; border-radius: 6px; font-size: .85rem; font-weight: bold;
      text-decoration: none; cursor: pointer; border: none;
      box-sizing: border-box;
    }
    .btn:hover { background: #1fa8a8; }
    .btn-all {
      background: #5a5249; color: #fff; padding: 14px 28px; border-radius: 8px;
      font-size: 1rem; font-weight: bold; border: none; cursor: pointer; margin-bottom: 24px;
    }
    .btn-all:hover { background: #3e3832; }
    .status { margin-top: 6px; font-size: .78rem; color: #2bbfbf; min-height: 16px; }
  </style>
</head>
<body>

<h1>📸 Récupération des photos de votre ancien site</h1>

<div class="info">
  <strong>Comment ça marche :</strong> Cliquez sur "Tout télécharger" pour récupérer toutes les photos,
  ou cliquez sur "Télécharger" sous chaque image individuellement.
  Les fichiers seront enregistrés dans votre dossier Téléchargements.
</div>

<button class="btn-all" onclick="downloadAll()">⬇ Tout télécharger</button>

<div class="grid" id="grid"></div>

<script>
const images = [
  {
    name: "Maxence_Lecointe.jpg",
    url: "https://web.archive.org/web/20210316135636im_/https://lecointe-osteopathe.fr/wp-content/uploads/2016/01/Maxence_Lecointe.jpg",
    label: "Votre photo de profil"
  },
  {
    name: "Lecointe-banner.jpg",
    url: "https://web.archive.org/web/20250125031712im_/https://lecointe-osteopathe.fr/wp-content/uploads/2017/12/Lecointe.jpg",
    label: "Bannière principale"
  },
  {
    name: "Consultation-banner.jpg",
    url: "https://web.archive.org/web/20250125031712im_/https://lecointe-osteopathe.fr/wp-content/uploads/2015/09/Consultation.jpg",
    label: "Page Consultation"
  },
  {
    name: "Contact-banner.jpg",
    url: "https://web.archive.org/web/20250125031712im_/https://lecointe-osteopathe.fr/wp-content/uploads/2015/09/Contact-1.jpg",
    label: "Page Contact"
  },
  {
    name: "massage.jpg",
    url: "https://web.archive.org/web/20250125031712im_/https://lecointe-osteopathe.fr/wp-content/uploads/2020/02/massage-2768833_1920-1024x724.jpg",
    label: "Massage / Ostéopathie"
  },
  {
    name: "personnes.jpg",
    url: "https://web.archive.org/web/20250125031712im_/https://lecointe-osteopathe.fr/wp-content/uploads/2020/02/people-1839564_1920-1024x683.jpg",
    label: "Patients / Personnes"
  },
  {
    name: "femme-enceinte.jpg",
    url: "https://web.archive.org/web/20250125031712im_/https://lecointe-osteopathe.fr/wp-content/uploads/2020/02/pregnant-1245703_1920-1024x683.jpg",
    label: "Femme enceinte"
  },
  {
    name: "senior.jpg",
    url: "https://web.archive.org/web/20250125031712im_/https://lecointe-osteopathe.fr/wp-content/uploads/2020/02/senior-3336451_1920-1024x768.jpg",
    label: "Sénior"
  },
  {
    name: "sportif-golf.jpg",
    url: "https://web.archive.org/web/20250125031712im_/https://lecointe-osteopathe.fr/wp-content/uploads/2020/11/golf-552906_1280.jpg",
    label: "Sportif (golf)"
  }
];

const grid = document.getElementById('grid');

images.forEach((img, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="${img.url}" alt="${img.label}" loading="lazy" onerror="this.style.background='#eee';this.style.height='80px'">
    <div class="card-body">
      <p><strong>${img.label}</strong><br>${img.name}</p>
      <button class="btn" onclick="downloadOne(${i})">⬇ Télécharger</button>
      <div class="status" id="status-${i}"></div>
    </div>
  `;
  grid.appendChild(card);
});

function downloadOne(i) {
  const img = images[i];
  const status = document.getElementById('status-' + i);
  status.textContent = 'Téléchargement...';
  fetch(img.url)
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = img.name;
      a.click();
      URL.revokeObjectURL(url);
      status.textContent = '✓ Téléchargé !';
      status.style.color = '#2bbfbf';
    })
    .catch(() => {
      status.textContent = '✗ Erreur — image non disponible';
      status.style.color = '#e55';
    });
}

async function downloadAll() {
  for (let i = 0; i < images.length; i++) {
    downloadOne(i);
    await new Promise(r => setTimeout(r, 800));
  }
}
</script>
</body>
</html>
